<!doctype html>
<html lang="en-US" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2358a6ff'/><stop offset='1' stop-color='%23a78bfa'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><polyline points='8,17 13,22 24,10' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="mobile-header">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2.5"
          >
            <polyline points="9 11 12 14 22 4" />
            <path
              d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"
            />
          </svg>
        </div>
        <span class="logo-text">Notes App</span>
        <button
          class="hamburger-btn"
          onclick="toggleMobileSidebar()"
          aria-label="Menu"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>

      <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="closeMobileSidebar()"
      ></div>

      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
            >
              <polyline points="9 11 12 14 22 4" />
              <path
                d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"
              />
            </svg>
          </div>
          <span class="logo-text">Notes App</span>
          <span class="logo-version">v1</span>
        </div>

        <nav class="nav">
          <span class="nav-section-label">Navigation</span>

          <button
            class="nav-item active"
            data-tab="tasks"
            onclick="switchTab('tasks')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="9 11 12 14 22 4" />
              <path
                d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"
              />
            </svg>
            Tasks
          </button>

          <button
            class="nav-item"
            data-tab="users"
            onclick="switchTab('users')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Users
          </button>

          <button
            class="nav-item"
            data-tab="stats"
            onclick="switchTab('stats')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
            Statistics
          </button>
        </nav>

        <div class="theme-toggle-row">
          <span class="theme-toggle-label" id="theme-label">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            Dark mode
          </span>
          <label class="toggle-switch" title="Toggle theme">
            <input
              type="checkbox"
              id="theme-toggle"
              onchange="toggleTheme(this.checked)"
            />
            <span class="toggle-track"></span>
          </label>
        </div>
      </aside>

      <main class="main">
        <section id="tab-tasks" class="tab active">
          <div class="section-header">
            <h1 class="section-title">Tasks</h1>
            <button class="btn btn-primary" onclick="openTaskModal()">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              New task
            </button>
          </div>

          <div class="filters-bar">
            <div class="filter-group">
              <label>User</label>
              <div class="cdd" id="cdd-filter">
                <div class="cdd-trigger" onclick="cddToggle('cdd-filter')">
                  <span class="cdd-label" id="cdd-filter-label">All users</span>
                </div>
                <div class="cdd-menu">
                  <div class="cdd-search-wrap">
                    <input
                      class="cdd-search"
                      placeholder="Search users..."
                      oninput="cddSearch('cdd-filter', this.value)"
                      onclick="event.stopPropagation()"
                    />
                  </div>
                  <div class="cdd-list" id="cdd-filter-list"></div>
                </div>
              </div>

              <input type="hidden" id="tf-uid" />
            </div>
            <div class="filter-group">
              <label>Items per page</label>
              <div class="page-size-wrap">
                <input
                  type="number"
                  class="page-size-input"
                  id="tf-limit"
                  value="20"
                  min="1"
                  max="1000"
                  onchange="
                    setPage('tasks', 0);
                    loadTasks();
                  "
                />
                <span class="page-size-sep">|</span>
                <select
                  class="page-size-select"
                  onchange="
                    document.getElementById('tf-limit').value = this.value;
                    setPage('tasks', 0);
                    loadTasks();
                  "
                >
                  <option value="10">10</option>
                  <option value="20" selected>20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
            <div class="filter-spacer"></div>
            <button class="btn btn-secondary" onclick="clearTaskFilters()">
              Reset
            </button>
          </div>

          <div class="content-wrap">
            <div
              id="tasks-loading-bar"
              class="content-loading-bar"
              style="display: none"
            ></div>
            <div id="tasks-container">
              <div class="loading">
                <div class="spinner"></div>
                Loading tasks...
              </div>
            </div>
          </div>
          <div id="tasks-pagination"></div>
        </section>

        <section id="tab-users" class="tab">
          <div class="section-header">
            <h1 class="section-title">Users</h1>
            <button class="btn btn-primary" onclick="openUserModal()">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              New user
            </button>
          </div>

          <div class="filters-bar">
            <div class="filter-group">
              <label>Items per page</label>
              <div class="page-size-wrap">
                <input
                  type="number"
                  class="page-size-input"
                  id="uf-limit"
                  value="20"
                  min="1"
                  max="1000"
                  onchange="
                    setPage('users', 0);
                    loadUsers();
                  "
                />
                <span class="page-size-sep">|</span>
                <select
                  class="page-size-select"
                  onchange="
                    document.getElementById('uf-limit').value = this.value;
                    setPage('users', 0);
                    loadUsers();
                  "
                >
                  <option value="10">10</option>
                  <option value="20" selected>20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
            <div class="filter-spacer"></div>
          </div>

          <div class="content-wrap">
            <div
              id="users-loading-bar"
              class="content-loading-bar"
              style="display: none"
            ></div>
            <div id="users-container">
              <div class="loading">
                <div class="spinner"></div>
                Loading users...
              </div>
            </div>
          </div>
          <div id="users-pagination"></div>
        </section>

        <section id="tab-stats" class="tab">
          <div class="section-header">
            <h1 class="section-title">Statistics</h1>
            <button class="btn btn-secondary" onclick="loadStats()">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
              </svg>
              Refresh
            </button>
          </div>

          <div class="filters-bar">
            <div class="filter-group">
              <label>User</label>
              <div class="cdd" id="cdd-stats">
                <div class="cdd-trigger" onclick="cddToggle('cdd-stats')">
                  <span class="cdd-label" id="cdd-stats-label">All users</span>
                </div>
                <div class="cdd-menu">
                  <div class="cdd-search-wrap">
                    <input
                      class="cdd-search"
                      placeholder="Search users..."
                      oninput="cddSearch('cdd-stats', this.value)"
                      onclick="event.stopPropagation()"
                    />
                  </div>
                  <div class="cdd-list" id="cdd-stats-list"></div>
                </div>
              </div>
              <input type="hidden" id="sf-uid" />
            </div>
            <div class="filter-group">
              <label>From</label>
              <input
                type="text"
                class="input-sm input-date"
                id="sf-from"
                lang="en-US"
                placeholder="yyyy-mm-dd"
                autocomplete="off"
                inputmode="numeric"
              />
            </div>
            <div class="filter-group">
              <label>To</label>
              <input
                type="text"
                class="input-sm input-date"
                id="sf-to"
                lang="en-US"
                placeholder="yyyy-mm-dd"
                autocomplete="off"
                inputmode="numeric"
              />
            </div>
            <div class="filter-spacer"></div>
            <button class="btn btn-secondary" onclick="clearStatsFilters()">
              Reset
            </button>
            <button class="btn btn-primary" onclick="loadStats()">Apply</button>
          </div>

          <div class="content-wrap">
            <div
              id="stats-loading-bar"
              class="content-loading-bar"
              style="display: none"
            ></div>
            <div id="stats-container">
              <div class="loading">
                <div class="spinner"></div>
                Loading statistics...
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div
      class="modal-overlay"
      id="task-modal-overlay"
      onclick="closeModal('task-modal-overlay', event)"
    >
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="task-modal-title">New task</h2>
          <button class="btn-icon" onclick="closeModal('task-modal-overlay')">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="form-group">
          <label class="form-label"
            >Title <span style="color: var(--danger)">*</span></label
          >
          <input
            type="text"
            class="form-control"
            id="task-title"
            placeholder="e.g., Buy groceries"
            maxlength="100"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea
            class="form-control"
            id="task-description"
            placeholder="Optional description..."
            maxlength="1000"
          ></textarea>
        </div>
        <div class="form-group" id="task-author-group">
          <label class="form-label"
            >Author <span style="color: var(--danger)">*</span></label
          >
          <div class="cdd cdd-full" id="cdd-author">
            <div class="cdd-trigger" onclick="cddToggle('cdd-author')">
              <span class="cdd-label" id="cdd-author-label"
                >— select a user —</span
              >
            </div>
            <div class="cdd-menu">
              <div class="cdd-search-wrap">
                <input
                  class="cdd-search"
                  placeholder="Search users..."
                  oninput="cddSearch('cdd-author', this.value)"
                  onclick="event.stopPropagation()"
                />
              </div>
              <div class="cdd-list" id="cdd-author-list"></div>
            </div>
          </div>
          <input type="hidden" id="task-author-id" />
        </div>
        <div class="form-group" id="task-status-group" style="display: none">
          <label class="form-label">Status</label>
          <div class="radio-group">
            <label class="radio-label"
              ><input type="radio" name="task-status" value="false" checked />
              Pending</label
            >
            <label class="radio-label"
              ><input type="radio" name="task-status" value="true" />
              Completed</label
            >
          </div>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('task-modal-overlay')"
          >
            Cancel
          </button>
          <button
            class="btn btn-primary"
            id="task-submit-btn"
            onclick="submitTask()"
          >
            Create task
          </button>
        </div>
      </div>
    </div>

    <div
      class="modal-overlay"
      id="user-modal-overlay"
      onclick="closeModal('user-modal-overlay', event)"
    >
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="user-modal-title">New user</h2>
          <button class="btn-icon" onclick="closeModal('user-modal-overlay')">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="form-group">
          <label class="form-label"
            >Full name <span style="color: var(--danger)">*</span></label
          >
          <input
            type="text"
            class="form-control"
            id="user-fullname"
            placeholder="e.g., John Doe"
            maxlength="100"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Phone number</label>
          <input
            type="text"
            class="form-control"
            id="user-phone"
            placeholder="e.g., +12345678900"
            maxlength="15"
          />
        </div>
        <div
          class="form-group"
          id="user-phone-null-group"
          style="display: none"
        >
          <label class="checkbox-label">
            <input
              type="checkbox"
              id="user-phone-null"
              onchange="onPhoneNullToggle(this)"
            />
            Clear phone number (set null)
          </label>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('user-modal-overlay')"
          >
            Cancel
          </button>
          <button
            class="btn btn-primary"
            id="user-submit-btn"
            onclick="submitUser()"
          >
            Create user
          </button>
        </div>
      </div>
    </div>

    <div
      class="modal-overlay"
      id="confirm-modal-overlay"
      onclick="closeModal('confirm-modal-overlay', event)"
    >
      <div class="modal" style="max-width: 480px">
        <div class="modal-header">
          <h2 class="modal-title" style="color: var(--danger)">
            <svg
              style="
                width: 24px;
                height: 24px;
                display: inline;
                margin-right: 10px;
                vertical-align: -5px;
              "
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
              />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            Confirm Delete
          </h2>
        </div>
        <p style="font-size: 18px; color: var(--text-muted)" id="confirm-text">
          Are you sure? This action cannot be undone.
        </p>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('confirm-modal-overlay')"
          >
            Cancel
          </button>
          <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
