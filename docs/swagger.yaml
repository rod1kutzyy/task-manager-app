host: 127.0.0.1:5050
info:
  contact: {}
  description: REST API for managing users, tasks, and task statistics.
  title: Notes app API
  version: "1.0"
paths:
  /statistics:
    get:
      description: Returns task statistics with optional filtering by `user_id` (UUID)
        and/or date range.
      parameters:
      - description: Filter statistics by user ID (UUID)
        format: uuid
        in: query
        name: user_id
        type: string
      - description: 'Start date (inclusive), format: YYYY-MM-DD'
        in: query
        name: from
        type: string
      - description: 'End date (exclusive), format: YYYY-MM-DD'
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Statistics response
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.getStatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Get task statistics
      tags:
      - statistics
  /tasks:
    get:
      description: Returns tasks with optional filtering by `user_id` (UUID) and optional
        pagination.
      parameters:
      - description: Filter tasks by author user ID (UUID)
        format: uuid
        in: query
        name: user_id
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Tasks list
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.taskDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new task in the system.
      parameters:
      - description: Task creation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.createTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created task
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.createTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Author not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Create a task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Deletes a task by UUID identifier.
      parameters:
      - description: Task ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Task deleted
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Delete a task
      tags:
      - tasks
    get:
      description: Returns a single task by UUID identifier.
      parameters:
      - description: Task ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Task found
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.getTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Get a task by ID
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: |-
        Updates task fields using three-state semantics for each field.
        1. Field is omitted: the value is not changed.
        2. Field has a value: the value is updated.
        3. Field is explicitly null: the value is cleared (set to NULL).
        Constraints: `title` and `completed` cannot be set to null.
      parameters:
      - description: Task ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Task patch payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.patchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated task
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.patchTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Partially update a task
      tags:
      - tasks
  /users:
    get:
      description: Returns users with optional pagination via limit and offset.
      parameters:
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Users list
          schema:
            items:
              $ref: '#/definitions/internal_features_users_transport_http.userDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user account.
      parameters:
      - description: User creation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created user
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.createUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Create a user
      tags:
      - users
  /users/{id}:
    delete:
      description: Deletes a user by UUID identifier.
      parameters:
      - description: User ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: User deleted
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Delete a user
      tags:
      - users
    get:
      description: Returns a single user by UUID identifier.
      parameters:
      - description: User ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User found
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.getUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Get a user by ID
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: |-
        Updates user fields using three-state semantics for each field.
        1. Field is omitted: the value is not changed.
        2. Field has a value: the value is updated.
        3. Field is explicitly null: the value is cleared (set to NULL).
        Constraint: `full_name` cannot be set to null.
      parameters:
      - description: User ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: User patch payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.patchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.patchUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_rod1kutzyy_task-manager-app_internal_core_transport_http_response.ErrorResponse'
      summary: Partially update a user
      tags:
      - users
