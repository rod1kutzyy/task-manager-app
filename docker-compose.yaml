services:
  notesapp:
    build:
      context: .
      dockerfile: ./cmd/notesapp/Dockerfile
    container_name: notesapp
    environment:
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_HOST=notesapp-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/out/logs
      - TIME_ZONE=${TIME_ZONE}
    depends_on:
      notesapp-postgres:
        condition: service_healthy
    volumes:
      - ./out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: unless-stopped

  notesapp-postgres:
    image: postgres:18.1-bookworm
    container_name: notesapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notesapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: notesapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:notesapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
