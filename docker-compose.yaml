services:
  notesapp:
    build:
      context: ${PROJECT_ROOT:-.}
      dockerfile: ${PROJECT_ROOT:-.}/cmd/notesapp/Dockerfile
    container_name: notesapp
    env_file:
      - ${PROJECT_ROOT:-.}/.env
    environment:
      - HTTP_ADDR=:5050
      - POSTGRES_HOST=notesapp-postgres
      - REDIS_HOST=notesapp-redis
      - LOGGER_FOLDER=/app/out/logs
    depends_on:
      notesapp-postgres:
        condition: service_healthy
      notesapp-redis:
        condition: service_healthy
    volumes:
      - ${PROJECT_ROOT:-.}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: unless-stopped

  notesapp-postgres:
    image: postgres:18.1-bookworm
    container_name: notesapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT:-.}/out/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notesapp-redis:
    image: redis:8.6.1
    container_name: notesapp-env-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${PROJECT_ROOT:-.}/out/redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notesapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT:-.}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: notesapp-port-forwarder
    entrypoint: |
      /bin/sh -c "
        socat -d -d tcp-listen:5432,fork,reuseaddr tcp-connect:notesapp-postgres:5432 &
        socat -d -d tcp-listen:6379,fork,reuseaddr tcp-connect:notesapp-redis:6379 &
        wait
      "
    ports:
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:6379:6379"

  swagger:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.26.2-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ./:/code
